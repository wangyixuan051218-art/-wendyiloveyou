<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Wendy</title>
  <style>
    html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;background:#101014;font-family:"Microsoft YaHei",Arial,sans-serif}canvas{display:block}.intro{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:#000;color:#fff8df;text-align:center}.intro h1{font-size:clamp(36px,7vw,92px);margin:0 0 18px;text-shadow:0 0 28px rgba(255,190,100,.45)}.intro p{margin:10px 0;color:#ffd76a;font-size:clamp(18px,3vw,34px);font-weight:700}.intro small{display:block;margin:12px 0 28px;color:rgba(255,255,255,.75);font-size:16px}.intro button{border:1px solid rgba(255,215,106,.75);border-radius:999px;padding:14px 30px;background:rgba(255,215,106,.14);color:#ffe8a3;font:inherit;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 0 28px rgba(255,190,80,.28)}.hint{position:fixed;left:24px;bottom:24px;z-index:5;max-width:min(360px,calc(100vw - 48px));border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:12px 16px;background:rgba(12,10,14,.62);color:#fff;font-size:clamp(14px,2vw,18px);font-weight:800;opacity:0;pointer-events:none;text-shadow:0 0 14px currentColor}.message{position:fixed;left:50%;top:50%;z-index:6;transform:translate(-50%,-50%);color:#ffd76a;font-size:clamp(46px,8vw,108px);font-weight:900;white-space:nowrap;opacity:0;pointer-events:none;text-shadow:0 0 18px rgba(255,215,106,.95),0 0 56px rgba(255,120,160,.72)}.end{position:fixed;left:50%;bottom:12%;z-index:6;transform:translate(-50%,16px);color:#fff2c7;font-size:clamp(26px,4vw,48px);font-weight:900;opacity:0;pointer-events:none;text-shadow:0 0 24px rgba(255,190,80,.85)}
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="intro" id="intro"><div><h1>Today is a special day...</h1><p>Make a wish for Wendy</p><small>Raise your hand in front of camera</small><button id="enter">Enter Celebration</button></div></div>
  <div class="hint" id="hint">Show your hand</div><div class="message" id="message">Happy Birthday Wendy</div><div class="end" id="end">I love you</div>
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { gsap } from 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js';
    const app=document.querySelector('#app'),intro=document.querySelector('#intro'),hint=document.querySelector('#hint'),msg=document.querySelector('#message'),end=document.querySelector('#end');
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x101014);
    const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,100); camera.position.set(0,1.7,5.2);
    const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; app.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffe7d6,1.2)); const light=new THREE.PointLight(0xffd1a8,2.2,12); light.position.set(2.8,4,3); light.castShadow=true; scene.add(light); const hemi=new THREE.HemisphereLight(0xffe7cf,0x241824,1.1); scene.add(hemi);
    const floor=new THREE.Mesh(new THREE.CircleGeometry(3,96),new THREE.ShadowMaterial({opacity:.26,color:0x27151d})); floor.rotation.x=-Math.PI/2; floor.position.y=-.03; floor.receiveShadow=true; scene.add(floor);
    const cake=new THREE.Group(); scene.add(cake); const cream=new THREE.MeshPhysicalMaterial({color:0xffd7df,roughness:.82,sheen:.5,emissive:0xffcad6,emissiveIntensity:.06}); const sponge=new THREE.MeshPhysicalMaterial({color:0xf0a3b6,roughness:.76,sheen:.25});
    function cyl(r,h,y,mat){const g=new THREE.CylinderGeometry(r,r*1.015,h,96,8); const p=g.attributes.position; for(let i=0;i<p.count;i++){let x=p.getX(i),z=p.getZ(i),rad=Math.hypot(x,z),n=(Math.sin(i*1.9)+Math.sin(i*.63))*0.01*r,s=rad?(rad+n)/rad:1;p.setXYZ(i,x*s,p.getY(i)+n*.12,z*s)} g.computeVertexNormals(); const m=new THREE.Mesh(g,mat); m.position.y=y; m.castShadow=m.receiveShadow=true; return m}
    [[1.45,.48,.24,-.02],[1.08,.42,.75,.018],[.72,.36,1.2,-.014]].forEach(([r,h,y,t])=>{const group=new THREE.Group(); group.rotation.z=t; group.add(cyl(r,h,y,sponge)); group.add(cyl(r*1.04,h*.2,y+h*.6,cream)); cake.add(group)});
    const flameMat=new THREE.MeshStandardMaterial({color:0xffc55a,emissive:0xff7a18,emissiveIntensity:1.9}); const flames=[];
    for(let i=0;i<5;i++){const a=i/5*Math.PI*2,c=new THREE.Group(); c.position.set(Math.cos(a)*.36,1.78,Math.sin(a)*.36); const body=new THREE.Mesh(new THREE.CylinderGeometry(.028,.032,.82,24),new THREE.MeshStandardMaterial({color:0xffd8e5,roughness:.62})); body.position.y=.41; body.castShadow=true; c.add(body); const f=new THREE.Mesh(new THREE.SphereGeometry(.075,18,18),flameMat); f.name='flame'; f.position.y=.99; f.scale.set(.55,1.4,.55); flames.push(f); c.add(f); cake.add(c)}
    const gift=new THREE.Group(); gift.visible=false; const red=new THREE.MeshStandardMaterial({color:0xc7335a,roughness:.55}),gold=new THREE.MeshStandardMaterial({color:0xffc15a,roughness:.32,metalness:.45}); gift.add(new THREE.Mesh(new THREE.BoxGeometry(.72,.55,.72),red)); let rb1=new THREE.Mesh(new THREE.BoxGeometry(.12,.59,.76),gold),rb2=new THREE.Mesh(new THREE.BoxGeometry(.76,.59,.12),gold); gift.add(rb1,rb2); gift.position.set(1.6,8,.1); scene.add(gift);
    const stars=new THREE.Points(new THREE.BufferGeometry(),new THREE.PointsMaterial({color:0xffc58a,size:.025,transparent:true,opacity:.75})); const arr=new Float32Array(1200*3); for(let i=0;i<arr.length;i+=3){arr[i]=(Math.random()-.5)*8;arr[i+1]=Math.random()*5;arr[i+2]=(Math.random()-.5)*5} stars.geometry.setAttribute('position',new THREE.BufferAttribute(arr,3)); scene.add(stars);
    let done=false; function showHint(t,c='#fff'){hint.textContent=t;hint.style.color=c;gsap.to(hint,{opacity:1,y:0,duration:.4})} function blow(){if(done)return;done=true;showHint('Enjoy the celebration','#ffd76a');flames.forEach(f=>gsap.to(f.scale,{x:0,y:0,z:0,duration:.35,onComplete:()=>f.visible=false}));gsap.to(light,{intensity:3.5,duration:2});setTimeout(fireworks,500)}
    function fireworks(){for(let n=0;n<5;n++)setTimeout(()=>{const geo=new THREE.BufferGeometry(),pos=[],vel=[];for(let i=0;i<120;i++){pos.push((Math.random()-.5)*.1,3+Math.random()*2,(Math.random()-.5)*.1);vel.push((Math.random()-.5)*.08,Math.random()*.08,(Math.random()-.5)*.08)}geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:0xff9fc0,size:.045,transparent:true,opacity:1}));scene.add(pts);gsap.to(pts.material,{opacity:0,duration:1.4,onComplete:()=>scene.remove(pts)});pts.userData.vel=vel},500+n*700);setTimeout(()=>{gsap.to(msg,{opacity:1,scale:1.05,duration:2,ease:'power2.out'});setTimeout(dropGift,2200)},4700)}
    function dropGift(){gift.visible=true;gsap.to(gift.position,{y:0,duration:1.4,ease:'bounce.out',onComplete:()=>gsap.to(end,{opacity:1,y:0,duration:.7})})}
    async function mic(){try{const s=await navigator.mediaDevices.getUserMedia({audio:true});const ctx=new AudioContext(),an=ctx.createAnalyser(),src=ctx.createMediaStreamSource(s),data=new Uint8Array(1024);src.connect(an);function loop(){an.getByteTimeDomainData(data);let p=0;for(const v of data)p=Math.max(p,Math.abs(v-128));if(p>18)blow(); if(!done)requestAnimationFrame(loop)}loop()}catch(e){console.warn(e)}}
    document.querySelector('#enter').onclick=()=>{gsap.to(intro,{opacity:0,duration:.7,onComplete:()=>intro.remove()});showHint('Show your hand');mic()}; addEventListener('keydown',e=>{if(e.code==='Space')blow()}); addEventListener('click',()=>{if(!intro.isConnected&&!done)blow()}); addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
    function animate(t){requestAnimationFrame(animate); cake.position.y=Math.sin(t*.0012)*.045; cake.rotation.y=Math.sin(t*.0009)*.045; flames.forEach((f,i)=>{if(f.visible){const s=1+Math.sin(t*.008+i)*.12;f.scale.set(.55*s,1.4*s,.55*s)}}); stars.rotation.y+=.0004; renderer.render(scene,camera)} animate(0);
  </script>
</body>
</html>
